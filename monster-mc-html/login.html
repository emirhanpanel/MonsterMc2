<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Giriş - MonsterMC</title>

<link rel="stylesheet" href="assets/css/auth.css">

<style>
body{
margin:0;
height:100vh;
background:url("assets/img/bg.jpg") center/cover no-repeat;
display:flex;
align-items:center;
justify-content:center;
font-family:Poppins;
}

/* GLASS BOX */
.login-box{
background:rgba(0,0,0,0.65);
backdrop-filter:blur(12px);
padding:40px;
border-radius:15px;
width:320px;
text-align:center;
color:white;
box-shadow:0 0 25px rgba(0,0,0,0.5);
}

.login-box h2{
margin-bottom:20px;
}

.login-box input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:8px;
outline:none;
}

.login-box button{
width:100%;
padding:12px;
margin-top:10px;
background:#8a2be2;
border:none;
border-radius:8px;
color:white;
cursor:pointer;
transition:0.3s;
}

.login-box button:hover{
background:#a855f7;
}

.link{
margin-top:15px;
display:block;
color:#ccc;
}

.error{
color:red;
font-size:13px;
display:none;
}
</style>

</head>
<body>

<div class="login-box">

<h2>MonsterMC Giriş</h2>

<form id="loginForm">

<input id="email" type="email" placeholder="Email" required>
<input id="password" type="password" placeholder="Şifre" required>

<p id="error" class="error"></p>

<button type="submit">Giriş Yap</button>

</form>

<a href="register.html" class="link">Hesabın yok mu? Kayıt ol</a>

</div>

<!-- 🔥 MODERN SİSTEM -->
<script type="module" src="assets/js/auth.js"></script>

<script src="assets/js/ui.js"></script>
<script>
loadComponent("navbar","navbar.html");
loadComponent("footer","footer.html");
</script>

<script>
loadComponent("modalContainer","modal.html");
loadComponent("notificationContainer","notification.html");
</script>


<div id="modalContainer"></div>
<div id="notificationContainer"></div>

<!-- LOADER COMPONENT -->
<div id="loaderContainer"></div>

<script>
loadComponent("loaderContainer","loader.html");
</script>

</body>
</html>
